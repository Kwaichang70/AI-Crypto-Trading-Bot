# alembic.ini
# -----------
# Alembic configuration for AI Crypto Trading Bot.
#
# IMPORTANT: The actual database URL is NOT set here.
# It is injected at runtime in env.py via the application's Settings object
# (reading from environment variables / .env file). This prevents credentials
# from being committed to version control.
#
# Usage:
#   cd infra
#   alembic upgrade head              # apply all pending migrations
#   alembic downgrade -1              # roll back one revision
#   alembic revision --autogenerate -m "add_new_table"   # generate migration
#   alembic history --verbose         # show migration chain
#   alembic current                   # show current revision in DB

[alembic]
# Path to migration scripts, relative to this alembic.ini file.
script_location = .

# Template for new migration file names.
# %(year)d%(month).2d%(day).2d_%(rev)s_%(slug)s.py produces names like:
# 20260227_abc1234_add_new_table.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Prepend sys.path entries for Python imports during migration.
# Set to project root so that `api`, `common`, and `trading` packages resolve.
prepend_sys_path = ../..

# Timezone for generated timestamps in migration file headers.
timezone = UTC

# Maximum width of lines in generated migration scripts (PEP 8).
# line_length = 88  # Black formatter default — uncomment if Black is installed

# Truncate revision identifiers in branch labels at this length.
truncate_slug_length = 40

# Set to 'true' to run the environment during autogenerate comparison.
# revision_environment = false

# Set to 'true' to avoid generating 'op.drop_column' calls for columns
# that are in the DB but not in the model. Useful during incremental
# schema addition. Leave false for strict drift detection.
# compare_server_default = false

# ---------------------------------------------------------------------------
# Logging configuration
# Uses Python's standard logging.config.fileConfig() format.
# ---------------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
