# =============================================================================
# AI Crypto Trading Bot — Docker Compose v2
# Orchestrates: api (FastAPI) + ui (Next.js) + postgres (PostgreSQL 16) + redis (Redis 7)
#
# Usage:
#   cp .env.example .env        # populate secrets
#   docker compose up -d        # start all services
#   docker compose logs -f api  # tail api logs
#   docker compose down -v      # stop and remove volumes
# =============================================================================

name: crypto-trading-bot

# ---------------------------------------------------------------------------
# Named volumes — data persists across container restarts
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ---------------------------------------------------------------------------
# Networks — services communicate on an isolated internal bridge
# Only ports explicitly mapped below are reachable from the host
# ---------------------------------------------------------------------------
networks:
  internal:
    driver: bridge
    internal: false   # set true in production to block external egress

# ---------------------------------------------------------------------------
# Service definitions
# ---------------------------------------------------------------------------
services:

  # --------------------------------------------------------------------------
  # PostgreSQL 16 — primary persistence store
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-trading_bot}
      POSTGRES_USER:     ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      # Tune for moderate-traffic workload on a single node
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading} -d ${POSTGRES_DB:-trading_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Resource limits — prevent runaway queries from starving other services
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m

  # --------------------------------------------------------------------------
  # Redis 7 — optional cache and lightweight job queue
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning",
             "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 192m
          cpus: "0.5"
        reservations:
          memory: 32m

  # --------------------------------------------------------------------------
  # API — FastAPI backend (Python 3.11)
  # --------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
      target: runtime
      args:
        PYTHON_VERSION: "3.11"
    image: crypto-trading-bot/api:local
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../models:/app/models
    environment:
      # -- Database --
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB:-trading_bot}
      POSTGRES_USER:     ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      # -- Redis --
      REDIS_URL:         redis://:${REDIS_PASSWORD:-}@redis:6379/0
      # -- Application --
      API_HOST:          ${API_HOST:-0.0.0.0}
      API_PORT:          ${API_PORT:-8000}
      LOG_LEVEL:         ${LOG_LEVEL:-info}
      ENVIRONMENT:       ${ENVIRONMENT:-development}
      # -- Trading safety gates --
      ENABLE_LIVE_TRADING:        ${ENABLE_LIVE_TRADING:-false}
      EXCHANGE_ID:                ${EXCHANGE_ID:-binance}
      EXCHANGE_API_KEY:           ${EXCHANGE_API_KEY:-}
      EXCHANGE_API_SECRET:        ${EXCHANGE_API_SECRET:-}
      EXCHANGE_API_PASSPHRASE:    ${EXCHANGE_API_PASSPHRASE:-}
      LIVE_TRADING_CONFIRM_TOKEN: ${LIVE_TRADING_CONFIRM_TOKEN:-}
      # -- Observability --
      PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED:-true}
      # -- CORS --
      ALLOWED_ORIGINS:     ${ALLOWED_ORIGINS:-http://localhost:3000}
      # -- Authentication --
      REQUIRE_API_AUTH:    ${REQUIRE_API_AUTH:-false}
      API_KEY_HASH:        ${API_KEY_HASH:-}
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL",
             "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    # Graceful shutdown — give FastAPI time to drain in-flight requests
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "2.0"
        reservations:
          memory: 256m

  # --------------------------------------------------------------------------
  # UI — Next.js frontend (Node 20)
  # --------------------------------------------------------------------------
  ui:
    build:
      context: ..
      dockerfile: infra/Dockerfile.ui
      target: runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    image: crypto-trading-bot/ui:local
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV:            production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      INTERNAL_API_URL:    http://api:8000
      PORT:                3000
    ports:
      - "${UI_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL",
             "wget -qO- http://localhost:3000/api/health 2>/dev/null || curl -f http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
