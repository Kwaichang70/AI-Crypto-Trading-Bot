# =============================================================================
# AI Crypto Trading Bot — Docker Compose v2
# Orchestrates: api (FastAPI) + ui (Next.js) + postgres (PostgreSQL 16) + redis (Redis 7)
#               + prometheus (metrics collection) + grafana (metrics dashboard)
#
# Usage:
#   cp .env.example .env        # populate secrets
#   docker compose up -d        # start all services
#   docker compose logs -f api  # tail api logs
#   docker compose down -v      # stop and remove volumes
# =============================================================================

name: crypto-trading-bot

# ---------------------------------------------------------------------------
# Named volumes — data persists across container restarts
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ---------------------------------------------------------------------------
# Networks — services communicate on isolated bridge networks
# Only ports explicitly mapped below are reachable from the host
# ---------------------------------------------------------------------------
networks:
  backend:
    driver: bridge
    internal: true    # no external egress — only inter-service traffic
  frontend:
    driver: bridge
    internal: false   # allows egress for UI/API public-facing ports

# ---------------------------------------------------------------------------
# Service definitions
# ---------------------------------------------------------------------------
services:

  # --------------------------------------------------------------------------
  # PostgreSQL 16 — primary persistence store
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-trading_bot}
      POSTGRES_USER:     ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      # Tune for moderate-traffic workload on a single node
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading} -d ${POSTGRES_DB:-trading_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Resource limits — prevent runaway queries from starving other services
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m

  # --------------------------------------------------------------------------
  # Redis 7 — optional cache and lightweight job queue
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-trading_redis_default_2024}
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning",
             "-a", "${REDIS_PASSWORD:-trading_redis_default_2024}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 192m
          cpus: "0.5"
        reservations:
          memory: 32m

  # --------------------------------------------------------------------------
  # API — FastAPI backend (Python 3.11)
  # --------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
      target: runtime
      args:
        PYTHON_VERSION: "3.11"
    image: crypto-trading-bot/api:local
    restart: unless-stopped
    networks:
      - backend
      - frontend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../models:/app/models
    environment:
      # -- Database --
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB:-trading_bot}
      POSTGRES_USER:     ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      # -- Redis --
      REDIS_URL:         redis://:${REDIS_PASSWORD:-trading_redis_default_2024}@redis:6379/0
      # -- Application --
      API_HOST:          ${API_HOST:-0.0.0.0}
      API_PORT:          ${API_PORT:-8000}
      LOG_LEVEL:         ${LOG_LEVEL:-info}
      ENVIRONMENT:       ${ENVIRONMENT:-development}
      # -- Trading safety gates --
      ENABLE_LIVE_TRADING:        ${ENABLE_LIVE_TRADING:-false}
      EXCHANGE_ID:                ${EXCHANGE_ID:-binance}
      EXCHANGE_API_KEY:           ${EXCHANGE_API_KEY:-}
      EXCHANGE_API_SECRET:        ${EXCHANGE_API_SECRET:-}
      EXCHANGE_API_PASSPHRASE:    ${EXCHANGE_API_PASSPHRASE:-}
      LIVE_TRADING_CONFIRM_TOKEN: ${LIVE_TRADING_CONFIRM_TOKEN:-}
      # -- Observability --
      PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED:-true}
      # -- CORS --
      ALLOWED_ORIGINS:     ${ALLOWED_ORIGINS:-http://localhost:3000}
      # -- Authentication --
      REQUIRE_API_AUTH:    ${REQUIRE_API_AUTH:-false}
      API_KEY_HASH:        ${API_KEY_HASH:-}
      # -- ML Auto-Retraining --
      ML_AUTO_RETRAIN:              ${ML_AUTO_RETRAIN:-false}
      ML_MIN_TRADES_FOR_RETRAIN:    ${ML_MIN_TRADES_FOR_RETRAIN:-50}
      ML_MIN_ACCURACY_THRESHOLD:    ${ML_MIN_ACCURACY_THRESHOLD:-0.38}
      ML_MAX_MODEL_VERSIONS:        ${ML_MAX_MODEL_VERSIONS:-5}
      ML_RETRAIN_INTERVAL_MINUTES:  ${ML_RETRAIN_INTERVAL_MINUTES:-60}
      # -- Telegram alerts --
      TELEGRAM_BOT_TOKEN:           ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID:             ${TELEGRAM_CHAT_ID:-}
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL",
             "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    # Graceful shutdown — give FastAPI time to drain in-flight requests
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "2.0"
        reservations:
          memory: 256m

  # --------------------------------------------------------------------------
  # UI — Next.js frontend (Node 20)
  # --------------------------------------------------------------------------
  ui:
    build:
      context: ..
      dockerfile: infra/Dockerfile.ui
      target: runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    image: crypto-trading-bot/ui:local
    restart: unless-stopped
    networks:
      - backend
      - frontend
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV:            production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      INTERNAL_API_URL:    http://api:8000
      PORT:                3000
    ports:
      - "${UI_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL",
             "wget -qO- http://localhost:3000/api/health 2>/dev/null || curl -f http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m

  # --------------------------------------------------------------------------
  # Prometheus — time-series metrics collection
  #
  # Scrapes GET /metrics from the api service every 15 s (see prometheus.yml).
  # Bound to 127.0.0.1 so the UI is not exposed on all interfaces by default.
  # Access: http://localhost:9090
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.4.0
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
        reservations:
          memory: 64m

  # --------------------------------------------------------------------------
  # Grafana — metrics visualisation dashboard
  #
  # Add Prometheus as a data source (URL: http://prometheus:9090) and import
  # community dashboards for Node.js/FastAPI or build custom ones.
  # Default login: admin / ${GRAFANA_PASSWORD:-admin}  (change in production!)
  # Access: http://localhost:3001
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.6.0
    restart: unless-stopped
    networks:
      - backend
      - frontend
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Serve behind a sub-path if needed: GF_SERVER_ROOT_URL=http://host/grafana/
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
        reservations:
          memory: 64m
