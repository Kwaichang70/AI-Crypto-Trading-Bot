[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "data"
version = "0.1.0"
description = "Market data fetching, caching, and technical indicator computation"
requires-python = ">=3.11"

dependencies = [
    "pandas>=2.2",
    "numpy>=1.26",
    "ccxt>=4.4",
    "structlog>=24.4",
    "pydantic>=2.9",
    "common",
    "scikit-learn>=1.5",
    "joblib>=1.4",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["data*"]

[tool.uv.sources]
common  = { workspace = true }
