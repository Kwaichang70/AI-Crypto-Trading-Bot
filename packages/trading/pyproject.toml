[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "trading"
version = "0.1.0"
description = "Core trading engine: strategies, execution, risk management"
requires-python = ">=3.11"

dependencies = [
    "pydantic>=2.9",
    "structlog>=24.4",
    "ccxt>=4.4",
    "common",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["trading*"]

[tool.uv.sources]
common = { workspace = true }
