[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "common"
version = "0.1.0"
description = "Shared types, enums, and configuration utilities"
requires-python = ">=3.11"

dependencies = [
    "pydantic>=2.9",
    "pydantic-settings>=2.5",
    "structlog>=24.4",
]

[tool.setuptools]
py-modules = ["config", "events", "logging", "metrics", "models", "types"]

[tool.setuptools.packages.find]
where = ["."]
include = ["common*"]
