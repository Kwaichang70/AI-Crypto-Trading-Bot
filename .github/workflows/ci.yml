# =============================================================================
# CI — AI Crypto Trading Bot
#
# Triggers:
#   - Push to main
#   - Pull requests targeting main
#
# Job graph (left = depends on right):
#
#   lint ──┬──► type-check
#          ├──► test-unit
#          │         └──► test-integration
#          ├──► build-api
#          └──► build-ui
#
# Notes:
#   - uv workspace is rooted at the project root (pyproject.toml + uv.lock)
#   - PYTHONPATH is set to project root + packages/ for monorepo imports
#   - All Python jobs run from the repository root, not apps/api
#   - Live trading is permanently disabled in CI (ENABLE_LIVE_TRADING=false)
# =============================================================================

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel in-progress runs for the same branch/PR to avoid queue buildup.
# This keeps resource usage lean on long-running feature branches.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Global environment — shared across all jobs
# ---------------------------------------------------------------------------
env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION:   "20"
  # uv version — pin for reproducible installs; bump deliberately
  UV_VERSION:     "0.5.18"

# =============================================================================
# Job: lint — Python linting via ruff (fail fast, no compute wasted downstream)
# =============================================================================
jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    # Run from the monorepo root so ruff picks up the root pyproject.toml
    # which has src = ["apps", "packages"] configured

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Cache the uv tool itself and the resolved package cache.
      # Key on root uv.lock (workspace lockfile) + root pyproject.toml.
      # Falls back to any pip cache on the same OS/Python combination.
      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.local/share/uv
          key: uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install uv
        run: |
          curl -LsSf "https://astral.sh/uv/${UV_VERSION}/install.sh" | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Install only the linting tools — no full workspace install needed here.
      # Using --system avoids venv creation overhead for this lightweight job.
      - name: Install ruff
        run: |
          uv tool install "ruff>=0.6"

      # ruff check: lint rules (E/W/F/I/B/C4/UP/ANN/S/RUF from root pyproject.toml)
      - name: Run ruff lint
        run: |
          ruff check . --output-format=github

      # ruff format --check: code style (non-destructive, just reports violations)
      - name: Run ruff format check
        run: |
          ruff format . --check


# =============================================================================
# Job: type-check — mypy static analysis across packages/ and apps/api/
# Depends on lint to avoid running expensive type checking on unformatted code.
# =============================================================================
  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.local/share/uv
          key: uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install uv
        run: |
          curl -LsSf "https://astral.sh/uv/${UV_VERSION}/install.sh" | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Install the full workspace so mypy can resolve all internal imports.
      # --all-extras pulls dev-dependencies (which includes mypy itself).
      - name: Install workspace dependencies
        run: |
          uv sync --all-extras --frozen 2>/dev/null || \
          uv sync --all-extras
          echo "$(pwd)/.venv/bin" >> "$GITHUB_PATH"

      # mypy is configured in root pyproject.toml:
      #   strict = true, ignore_missing_imports = true, excludes tests/ alembic/
      # --no-error-summary keeps output concise for GitHub annotations.
      # All 29 errors resolved in Sprint 7 — mypy failures now block CI.
      - name: Run mypy
        env:
          PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/packages"
        run: |
          .venv/bin/mypy packages/ apps/api/ \
            --ignore-missing-imports \
            --no-error-summary \
            --show-column-numbers


# =============================================================================
# Job: test-unit — fast unit tests, no external services required
# Depends on lint so a broken file doesn't churn test output.
# =============================================================================
  test-unit:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    env:
      # Monorepo PYTHONPATH: root (for absolute imports) + packages/ (siblings)
      PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/packages"
      # Safety gates — live trading is always OFF in CI
      ENABLE_LIVE_TRADING:        "false"
      EXCHANGE_API_KEY:           ""
      EXCHANGE_API_SECRET:        ""
      LIVE_TRADING_CONFIRM_TOKEN: ""
      # Application config
      LOG_LEVEL:   "warning"
      ENVIRONMENT: "test"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.local/share/uv
          key: uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install uv
        run: |
          curl -LsSf "https://astral.sh/uv/${UV_VERSION}/install.sh" | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install workspace dependencies
        run: |
          uv sync --all-extras --frozen 2>/dev/null || \
          uv sync --all-extras
          echo "$(pwd)/.venv/bin" >> "$GITHUB_PATH"

      # Run unit tests only — these must not require a database or Redis.
      # If tests/unit/ does not exist yet, we skip gracefully with a warning.
      - name: Run unit tests
        run: |
          if [ -d "tests/unit" ]; then
            .venv/bin/pytest tests/unit/ \
              -v \
              --tb=short \
              --strict-markers \
              --cov=apps \
              --cov=packages \
              --cov-report=term-missing \
              --cov-report=xml:coverage-unit.xml \
              --cov-fail-under=60
          else
            echo "::warning::tests/unit/ directory not found — skipping unit tests."
            echo "Create tests/unit/ with at least one test file to enable this job."
          fi

      - name: Upload unit coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit.xml
          retention-days: 7
          # Do not fail if the coverage file was never produced (skipped run)
          if-no-files-found: warn


# =============================================================================
# Job: test-integration — tests requiring PostgreSQL + Redis service containers
# Only runs after lint + type-check + test-unit all pass.
# Integration suite covers 100+ tests across 5 router files — failures block CI.
# =============================================================================
  test-integration:
    name: Integration tests (pytest + postgres + redis)
    runs-on: ubuntu-latest
    needs: [lint, type-check, test-unit]

    services:
      # PostgreSQL 16 service container — available at localhost:5432 during the job
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       trading_bot_test
          POSTGRES_USER:     trading_test
          POSTGRES_PASSWORD: ci_test_password_not_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trading_test -d trading_bot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis 7 service container — available at localhost:6379 during the job
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    env:
      # Monorepo PYTHONPATH
      PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/packages"
      # Database connection — matches the service container above
      POSTGRES_HOST:     localhost
      POSTGRES_PORT:     5432
      POSTGRES_DB:       trading_bot_test
      POSTGRES_USER:     trading_test
      POSTGRES_PASSWORD: ci_test_password_not_secret
      DATABASE_URL: >-
        postgresql+asyncpg://trading_test:ci_test_password_not_secret@localhost:5432/trading_bot_test
      # Redis — database 1 to avoid collisions with any default data
      REDIS_URL: redis://localhost:6379/1
      # Safety gates
      ENABLE_LIVE_TRADING:        "false"
      EXCHANGE_API_KEY:           ""
      EXCHANGE_API_SECRET:        ""
      LIVE_TRADING_CONFIRM_TOKEN: ""
      # Application config
      LOG_LEVEL:   "warning"
      ENVIRONMENT: "test"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.local/share/uv
          key: uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install uv
        run: |
          curl -LsSf "https://astral.sh/uv/${UV_VERSION}/install.sh" | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install workspace dependencies
        run: |
          uv sync --all-extras --frozen 2>/dev/null || \
          uv sync --all-extras
          echo "$(pwd)/.venv/bin" >> "$GITHUB_PATH"

      # Explicit health check — service containers may report healthy before
      # the TCP port is actually reachable from the runner.
      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U trading_test; do
            echo "Waiting for postgres..."
            sleep 2
          done

      # Run integration tests only — skip gracefully if directory missing.
      - name: Run integration tests
        run: |
          if [ -d "tests/integration" ]; then
            .venv/bin/pytest tests/integration/ \
              -v \
              --tb=short \
              --strict-markers \
              --cov=apps \
              --cov=packages \
              --cov-report=term-missing \
              --cov-report=xml:coverage-integration.xml
          else
            echo "::warning::tests/integration/ directory not found — skipping integration tests."
            echo "Create tests/integration/ to enable database-backed test coverage."
          fi

      - name: Upload integration coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage-integration.xml
          retention-days: 7
          if-no-files-found: warn


# =============================================================================
# Job: build-api — verify the FastAPI Docker image compiles cleanly
# Depends on lint only — build failures should surface independently of tests.
# =============================================================================
  build-api:
    name: Build API Docker image
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Docker Buildx enables BuildKit features: multi-platform, inline cache,
      # and the type=gha cache backend used below.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # type=gha uses GitHub Actions cache as the BuildKit cache backend.
      # This is simpler and more reliable than the local /tmp dir rotation pattern.
      - name: Build API image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.api
          # Target the production runtime stage — validates the full build graph
          target: runtime
          push: false
          tags: crypto-trading-bot/api:ci-${{ github.sha }}
          # GitHub Actions native cache: no manual directory rotation needed
          cache-from: type=gha,scope=api
          cache-to:   type=gha,scope=api,mode=max
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}


# =============================================================================
# Job: build-ui — verify the Next.js Docker image and standalone output
# Depends on lint only — same reasoning as build-api.
# =============================================================================
  build-ui:
    name: Build UI Docker image
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # actions/setup-node has built-in npm cache support
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      # Standalone host build step: catches TypeScript compilation errors
      # and verifies next build produces the .next/standalone output
      # without requiring a full Docker build on every push.
      - name: Install UI dependencies
        working-directory: apps/ui
        run: npm ci

      - name: Build Next.js (standalone verification)
        working-directory: apps/ui
        env:
          # Disable telemetry in CI
          NEXT_TELEMETRY_DISABLED: "1"
          # Build-time public env var — supply a placeholder for CI
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
        run: npm run build

      # Docker build step: validates the multi-stage Dockerfile is coherent.
      # Uses type=gha cache to avoid re-downloading npm packages inside Docker.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build UI Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.ui
          # Target the production runner stage
          target: runner
          push: false
          tags: crypto-trading-bot/ui:ci-${{ github.sha }}
          cache-from: type=gha,scope=ui
          cache-to:   type=gha,scope=ui,mode=max
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            NEXT_PUBLIC_API_URL=http://localhost:8000
